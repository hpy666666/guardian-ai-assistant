## IDF Component Manager Manifest File
dependencies:
  ## ESP-ADF official audio codec & effects (replaces 78/esp-opus-encoder)
  ## Provides: esp_opus_enc, esp_opus_dec, esp_ae_rate_cvt
  espressif/esp_audio_codec: "~2.4.1"
  espressif/esp_audio_effects: "~1.2.1"

  ## esp-sr: AFE (AEC + VAD + NS) and SR models
  espressif/esp-sr: "~2.3.0"

  ## WebSocket client
  espressif/esp_websocket_client: ">=1.1.0"

  ## Required IDF version (aligned with xiaozhi upstream)
  idf:
    version: ">=5.5.2"
